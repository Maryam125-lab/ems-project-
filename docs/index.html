<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="2; url=https://tablets-offers-continue-bearing.trycloudflare.com/">
  <title>TRACK360 ERP Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef4ff;
      color: #14213d;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(rgba(37, 99, 235, .04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, .04) 1px, transparent 1px),
        linear-gradient(135deg, #eef4ff, #f8fbff);
      background-size: 42px 42px, 42px 42px, auto;
    }
    main {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid #dbe5f5;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, .12);
      padding: 34px;
      text-align: center;
    }
    .logo {
      width: 58px;
      height: 58px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      font-size: 30px;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(37, 99, 235, .28);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: #5b6b84;
      line-height: 1.6;
    }
    .actions {
      display: grid;
      gap: 12px;
      margin-top: 26px;
    }
    a {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      height: 48px;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(37, 99, 235, .25);
    }
    code {
      display: block;
      padding: 11px 12px;
      border-radius: 10px;
      background: #f1f5f9;
      color: #334155;
      word-break: break-all;
    }
    .note {
      margin-top: 18px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">↯</div>
    <h1>TRACK360 ERP Demo</h1>
    <p>The demo is opening now. If your browser does not redirect automatically, use the launch button below.</p>
    <div class="actions">
      <a href="https://tablets-offers-continue-bearing.trycloudflare.com/">Launch ERP Demo</a>
      <code>https://tablets-offers-continue-bearing.trycloudflare.com/</code>
    </div>
    <p class="note">This secure demo link is active while the TRACK360 ERP demo server is running.</p>
  </main>
  <script>
    setTimeout(function () {
      window.location.href = 'https://tablets-offers-continue-bearing.trycloudflare.com/';
    }, 1200);
  </script>
</body>
</html>
