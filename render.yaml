services:
  - type: web
    name: track360-erp
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__ExpiresHours
        value: 8
